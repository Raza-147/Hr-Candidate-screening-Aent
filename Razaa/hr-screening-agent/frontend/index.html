<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Candidate Screening Agent</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Setup Clerk using the script tag -->
    <script async crossorigin="anonymous" data-clerk-publishable-key="pk_test_dmlhYmxlLXJhY2VyLTI4LmNsZXJrLmFjY291bnRzLmRldiQ" src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>
    
    <div id="app" style="display: none;">
        <header>
            <div class="header-content">
                <h1>HR Candidate Screening</h1>
                <div id="user-button"></div>
            </div>
        </header>
        
        <main>
            <div class="card upload-section">
                <h2>Upload CV</h2>
                <form id="upload-form">
                    <div class="form-group">
                        <label for="candidateName">Candidate Name</label>
                        <input type="text" id="candidateName" name="candidateName" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="candidateEmail">Candidate Email</label>
                        <input type="email" id="candidateEmail" name="candidateEmail" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="jobDescription">Job Description</label>
                        <textarea id="jobDescription" name="jobDescription" rows="4" required placeholder="Paste the job description here..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="cvFile">CV (PDF only)</label>
                        <input type="file" id="cvFile" name="cvFile" accept=".pdf" required>
                    </div>
                    <button type="submit" id="submitBtn">
                        <span class="btn-text">Process Candidate</span>
                        <span class="loader" style="display: none;"></span>
                    </button>
                </form>
            </div>

            <div class="card results-section">
                <h2>Candidate Rankings</h2>
                <button id="refreshBtn" class="secondary-btn">Refresh List</button>
                <div class="table-container">
                    <table id="candidatesTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Score</th>
                                <th>Status</th>
                                <th>Reasoning</th>
                            </tr>
                        </thead>
                        <tbody id="candidatesBody">
                            <!-- Rows will be populated here by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Sign-in Container -->
    <div id="sign-in-container" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh;">
        <div id="sign-in"></div>
        <button id="devBypassBtn" style="margin-top: 2rem; max-width: 300px; background-color: #334155;">Enter Dev Mode (Bypass Login)</button>
        <p style="margin-top: 1rem; color: #94a3b8; font-size: 0.875rem;">Note: You need to add your Clerk Publishable Key in index.html for real auth.</p>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
